apiVersion: apps/v1
kind: Deployment
metadata:
  name: song-service
  namespace: spotify-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: song-service
  template:
    metadata:
      labels:
        app: song-service
    spec:
      containers:
      - name: song-service
        image: mohdshoyab/song-service:latest
        ports:
        - containerPort: 7000
        envFrom:
        - configMapRef:
            name: song-config