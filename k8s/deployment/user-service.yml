apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: spotify-prod
spec:
  replicas: 2
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      containers:
      - name: user-service
        image: mohdshoyab/user-service:latest
        ports:
        - containerPort: 5000
        envFrom:
        - configMapRef:
            name: user-config